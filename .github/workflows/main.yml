name: Dropdown Example

on:
  push:
    branches:
     - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - production
jobs:
  run-job:
    runs-on: ubuntu-latest
    steps:
      - name: Print selected value
        run: echo "Environment is ${{ github.event.inputs.environment}}"
